syntax = "proto3";

import "google/protobuf/duration.proto";
import "google/protobuf/wrappers.proto";

import public "mms/dim.proto";
import public "mms/sockaddr.proto";

package quasar.pb;

enum DSPType {
  RustFFT = 0;
  CUDA = 1;
}

enum DriftAngleCalculationMethod {
  SpectrumPeak = 0;
  GaussianFit = 1;
}

enum ColorMap {
  Grayscale = 0;
  Jet = 1;
}

enum StripBackProjectionMethod {
  StripBackProjectionMethodExact = 0;
  StripBackProjectionMethodFFBP = 1;
}

enum ImageFormatKind {
  ImageFormatKindJPEG = 0;
  ImageFormatKindPNG = 1;
}

enum VideoBackend {
  VideoBackendAuto = 0;
  VideoBackendFFmpeg = 1;
  VideoBackendGStreamer = 2;
}

enum VideoCodec {
  VideoCodecH265 = 0;
  VideoCodecH264 = 1;
}

enum VideoQuality {
  VideoQualityMedium = 0;
  VideoQualityLow = 1;
  VideoQualityHigh = 2;
}

enum CompressionPreset {
  CompressionPresetUltraFast = 0;
  CompressionPresetMedium = 1;
  CompressionPresetSlow = 2;
  CompressionPresetSlower = 3;
}

message ImageFormat {
  /// Формат выходного изображения
  ///
  /// Ключ: `-F`, `--output-formats`, `--formats`
  /// По умолчанию: JPEG
  ImageFormatKind kind = 1;

  /// Качество сжатия JPEG, 0-100
  ///
  /// Пример: `jpg:80`
  /// По умолчанию: 80
  google.protobuf.UInt32Value jpeg_quality = 2;
}

message ControlArgs {
  /// Коэффициент усиления видео, 0-255
  ///
  /// Ключ: `--vg`, `--video-gain`
  google.protobuf.UInt32Value video_gain = 1;

  /// Отключение навигации
  ///
  /// Ключ: `--no-nav`
  /// По умолчанию: false
  bool no_nav = 2;
}

message SharedFormArgs {
  /// Входной файл голограммы
  ///
  /// По умолчанию: автоматически при записи сигнала.
  /// Если строка не пуста, формирование сигнала не будет выполнено
  string input = 1;

  /// Тип вычислителя
  ///
  /// Ключ: `-D`, `--dsp`, `--dsp-type`
  DSPType dsp_type = 2;

  /// Режим РЛС
  ///
  /// Ключ: `-m`, `--mode`
  /// По умолчанию: 1
  google.protobuf.UInt32Value mode = 3;

  /// Смещение по времени в секундах
  ///
  /// Ключ: `-t`, `-Tshift`, `--time-shift`
  /// По умолчанию: 1.0 с
  google.protobuf.Duration time_shift = 4;

  /// Время синтезирования в секундах
  ///
  /// Ключ: `-T`, `--Ts`, `--synthesis-time`
  /// По умолчанию: 0.5 с
  google.protobuf.Duration synthesis_time = 5;

  /// Количество отсчётов в синхопаузе.
  ///
  /// Если значение задано пользователем, оно будет использовано вместо значения из конфигурационного
  /// файла для данного режима работы РЛС.
  ///
  /// Ключ: `--nsync`, `--sync-sample-count`
  google.protobuf.UInt32Value sync_sample_count = 6;

  /// Высота ландшафта относительно уровня моря в точке старта, в метрах
  ///
  /// Ключ: `--e0`, `--terrain-altitude`
  /// По умолчанию: 0.0
  google.protobuf.FloatValue terrain_altitude = 7;

  /// Высота носителя в метрах
  ///
  /// Если значение задано пользователем, оно будет использовано вместо высоты носителя
  /// из навигационного файла
  ///
  /// Ключ: `-e`, `--altitude`
  google.protobuf.FloatValue altitude = 8;

  /// Скорость носителя в км/ч
  ///
  /// Если значение задано пользователем, оно будет использовано вместо скорости носителя
  /// из навигационного файла
  ///
  /// Ключ: `-v`, `--velocity`
  google.protobuf.FloatValue velocity = 9;

  /// Коэффициент частотной интерполяции
  ///
  /// Ключ: `--fic`
  /// По умолчанию: 1
  google.protobuf.UInt32Value fic = 10;

  /// Шаг по дальности, м/px
  ///
  /// Ключ: `--dx`
  /// По умолчанию: 1.0
  google.protobuf.FloatValue dx = 11;

  /// Шаг по путевой дальности, м/px
  ///
  /// Ключ: `--dy`
  /// По умолчанию: 1.0
  google.protobuf.FloatValue dy = 12;

  /// Ближняя граница кадра в метрах
  ///
  /// Ключ: `--x0`, `--near-edge`
  /// По умолчанию: 100.0
  google.protobuf.FloatValue near_edge = 13;

  /// Смещение кадра
  ///
  /// Ключ: `--y0`, `--frame-offset`
  /// По умолчанию: 400.0
  google.protobuf.FloatValue frame_offset = 14;

  /// Протяженность кадра по дальности в метрах
  ///
  /// Ключ: `--lx`, `--image-width`
  /// По умолчанию: 2000.0
  google.protobuf.FloatValue image_width = 15;

  /// Протяженность кадра по путевой дальности в метрах
  ///
  /// Ключ: `--ly`, `--image-height`
  /// По умолчанию: 400.0
  google.protobuf.FloatValue image_height = 16;

  /// Угол сноса в градусах
  ///
  /// Если значение задано пользователем, оно будет использовано вместо расчётного
  /// значения угла сноса
  ///
  /// Ключ: `--da`, `--drift-angle`
  google.protobuf.FloatValue drift_angle = 17;

  /// Метод расчёта угла сноса
  ///
  /// Ключ: `--dcm`, `--drift-angle-method`
  /// По умолчанию: GaussianFit
  DriftAngleCalculationMethod drift_angle_method = 18;

  /// Цветовая схема результирующего изображения
  ///
  /// Ключ: `--output-color-map`
  /// По умолчанию: Grayscale
  ColorMap output_color_map = 19;

  /// Множитель яркости
  ///
  /// Ключ: `-b`, `--brightness-multiplier`
  /// По умолчанию: 1.0
  google.protobuf.FloatValue brightness_multiplier = 20;

  /// Задержка между голограммой и файлом навигации.
  ///
  /// По умолчанию: не задана,
  /// рассчитывается исходя из разницы между последним временем записи в файлы.
  ///
  /// Ключ: `--nav-delay`
  /// Sentinel-value: 0.0
  google.protobuf.Duration nav_delay = 21;

  /// Сохранение отладочных графиков наряду с основным изображением
  ///
  /// Ключ: `-P`, `--plots`
  /// По умолчанию: false
  bool plots = 22;

  /// Выходной файл. Указывается без расширения файла.
  /// Если не задан, результат выполнения команды будет сохранен рядом с входным файлом голограммы в
  /// подпапке `images` с именем файла, совпадающим с именем файла голограммы.
  ///
  /// Ключ: `-O`, `--output`
  string output = 23;

  /// Формат/форматы выходного изображения, через запятую.
  ///
  /// Для формата JPEG через двоеточие допускается указание качества сжатия JPEG.
  /// Допускаются следующие значения: `jpg`, `png`
  /// Примеры корректного списка форматов:
  /// - jpg:80
  /// - jpg:100,png
  ///
  /// Ключ: `-F`, `--output-formats`, `--formats`
  /// По умолчанию: jpg:80
  repeated ImageFormat output_formats = 24;

  /// Сервер для фоновой передачи результата в формате IPv4:port.
  ///
  /// Ключ: `-r`, `--remote`
  mms.pb.SockaddrV4 remote = 25;

  /// Параметры управления аппаратной частью, общие для режимов формирования.
  ControlArgs control = 26;
}

message FormTelescopicArgs {
  SharedFormArgs base = 1;

  /// Угол расхождения луча диаграммы направленности в градусах
  ///
  /// Ключ: `--div`, `--divergence-angle`
  /// По умолчанию: 20.0
  google.protobuf.FloatValue divergence_angle = 2;
}

message FormStripArgs {
  SharedFormArgs base = 1;

  /// Продолжительность полосовой съемки. Если не задано, будет взята максимально возможная
  /// продолжительность голограммы исходя из частоты оцифровки АЦП для текущего режима РЛС.
  ///
  /// Ключ: `--strip-timespan`
  google.protobuf.Duration strip_timespan = 2;

  /// Коэффициент множителя скорости
  ///
  /// Ключ: `--velocity-multiplier`
  /// По умолчанию: 1.0
  google.protobuf.FloatValue velocity_multiplier = 3;

  /// Метод обратной проекции для полосового режима.
  ///
  /// Допускаются следующие значения: `exact`, `ffbp`
  /// Ключ: `--bp-method`
  /// По умолчанию: Exact
  StripBackProjectionMethod bp_method = 4;
}

message AutofocusArgs {
  SharedFormArgs base = 1;

  /// Координаты X и Y центра сектора фокусировки в метрах, через запятую
  ///
  /// Ключ: `--center`, `--autofocus-center`
  mms.pb.Dim2 autofocus_center = 2;

  /// Сторона квадрата сектора фокусировки в метрах
  ///
  /// Ключ: `--side`, `--autofocus-side`
  /// По умолчанию: 50.0
  google.protobuf.FloatValue autofocus_side = 3;

  /// Угол расхождения луча диаграммы направленности в градусах
  ///
  /// Ключ: `--div`, `--divergence-angle`
  /// По умолчанию: 20.0
  google.protobuf.FloatValue divergence_angle = 4;

  /// Сохранение промежуточных кадров для отладки
  ///
  /// Ключ: `--keep-frames`
  /// По умолчанию: false
  bool keep_frames = 5;
}

message VideoArgs {
  SharedFormArgs base = 1;

  /// Угол расхождения луча диаграммы направленности в градусах
  ///
  /// Ключ: `--div`, `--divergence-angle`
  /// По умолчанию: 20.0
  google.protobuf.FloatValue divergence_angle = 2;

  /// Частота кадров видеопотока
  ///
  /// Ключ: `--framerate`
  /// По умолчанию: 60
  google.protobuf.UInt32Value framerate = 3;

  /// Длительность видеопотока. Если не задано, будет взята максимально возможная
  /// продолжительность голограммы исходя из частоты оцифровки АЦП для текущего режима РЛС.
  ///
  /// Ключ: `--timespan`, `--duration`
  google.protobuf.Duration timespan = 4;

  /// Сохранение промежуточных кадров видеопотока для отладки
  ///
  /// Ключ: `--keep-frames`
  /// По умолчанию: false
  bool keep_frames = 5;

  /// Бэкенд кодирования видеопотока
  ///
  /// Допускаются следующие значения: `auto`, `ffmpeg`, `gstreamer`
  /// Ключ: `--video-backend`
  /// По умолчанию: Auto
  VideoBackend video_backend = 6;

  /// Видеокодек
  ///
  /// Допускаются следующие значения: `h265`, `h264`
  /// Ключ: `--video-codec`
  /// По умолчанию: H265
  VideoCodec video_codec = 7;

  /// Битрейт видеокодировщика GStreamer, бит/с. По умолчанию: согласно шаблону качества
  ///
  /// Ключ: `--video-bitrate`
  google.protobuf.UInt32Value video_bitrate = 8;

  /// Путь к исполняемому файлу FFmpeg. Имеет приоритет над QUASAR_FFMPEG и встроенным FFmpeg
  ///
  /// Ключ: `--ffmpeg-path`
  string ffmpeg_path = 9;

  /// Шаблон качества видеопотока
  ///
  /// Допускаются следующие значения: `low`, `medium`, `high`
  /// Ключ: `--quality`
  /// По умолчанию: Medium
  VideoQuality quality = 10;

  /// Значение CRF для кодировщика видеопотока (0-51). По умолчанию: согласно шаблону качества
  ///
  /// Ключ: `--crf`
  google.protobuf.UInt32Value crf = 11;

  /// Тип компрессии видеопотока. По умолчанию: согласно шаблону качества
  ///
  /// Допускаются следующие значения: `ultrafast`, `medium`, `slow`, `slower`
  /// Ключ: `--preset`
  optional CompressionPreset preset = 12;

  /// Шумоподавление. По умолчанию: согласно шаблону качества
  ///
  /// Ключ: `--denoise`
  google.protobuf.BoolValue denoise = 13;

  /// Не выполнять шумоподавление при рендеринге видеопотока. По умолчанию: согласно шаблону качества
  ///
  /// Ключ: `--no-denoise`
  google.protobuf.BoolValue no_denoise = 14;
}
