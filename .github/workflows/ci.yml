name: Build and Release

on:
  push:
    branches: [ main, master ]
    tags: [ '*' ]
  pull_request:
  release:
    types: [ published ]

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRY_WHS31_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
  CONAN_LOGIN_USERNAME: ${{ secrets.CONAN_USERNAME }}
  CONAN_PASSWORD: ${{ secrets.CONAN_PASSWORD }}

jobs:
  build-armv7:
    runs-on: ubuntu-latest
    container:
      image: debian:bullseye
    env:
      TARGET: armv7-unknown-linux-gnueabihf
      LINKER: arm-linux-gnueabihf-gcc
      PUBLISH_RELEASE_ARTIFACTS: ${{ github.event_name == 'release' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup cache
        uses: actions/cache@v4
        with:
          path: |
            /root/.cargo/registry
            /root/.cargo/git
            target
          key: debian-bullseye-cargo-armv7-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            debian-bullseye-cargo-armv7

      - name: Install prerequisites
        run: |
          mkdir -p ~/.cargo
          cat > ~/.cargo/config.toml << EOF
          [registry]
          global-credential-providers = ["cargo:token"]
          
          [registries.whs31]
          index = "sparse+https://af.whs31.com/artifactory/api/cargo/quasar-cargo/index/"
          EOF

          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain stable --profile minimal

      - name: Add Rust target
        run: |
          . $HOME/.cargo/env
          rustup target add $TARGET

      - name: Configure Cargo
        run: |
          . $HOME/.cargo/env
          mkdir -p $HOME/.cargo
          cat >> $HOME/.cargo/config.toml <<EOF
          [target.${TARGET}]
          linker = "${LINKER}"
          EOF

      - name: Build binary
        run: |
          . $HOME/.cargo/env
          cargo build --release --target $TARGET -p quasarctl

      - name: Install cargo-deb
        run: |
          . $HOME/.cargo/env
          cargo install cargo-deb

      - name: Build deb package
        run: |
          . $HOME/.cargo/env
          cargo deb -p quasarctl --target $TARGET --no-build

      - name: Copy output files
        run: |
          conan profile detect --force
          sed -i '/compiler=/c\compiler=gcc' ~/.conan2/profiles/default
          sed -i '/compiler.version=/c\compiler.version=14' ~/.conan2/profiles/default
          sed -i '/compiler.libcxx=/c\compiler.libcxx=libstdc++11' ~/.conan2/profiles/default
          sed -i '/compiler.cppstd=/c\compiler.cppstd=20' ~/.conan2/profiles/default
          printf '\n[conf]\ntools.cmake.cmaketoolchain:generator=Ninja\n' >> ~/.conan2/profiles/default
          
          conan remote add whs31 https://af.whs31.com/artifactory/api/conan/quasar-conan 
          conan remote login whs31 "${{ secrets.CONAN_USERNAME }}" -p "${{ secrets.CONAN_PASSWORD }}"

      - name: Upload artifacts
        if: env.PUBLISH_RELEASE_ARTIFACTS == 'true'
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: quasarctl-${{ env.TARGET }}
          path: .build/${{ env.TARGET }}/*

      - name: Install Python
        if: env.PUBLISH_RELEASE_ARTIFACTS == 'true'
        run: |
          mkdir -p ~/.cargo
          cat > ~/.cargo/config.toml << EOF
          [registry]
          global-credential-providers = ["cargo:token"]
          
          [registries.whs31]
          index = "sparse+https://af.whs31.com/artifactory/api/cargo/quasar-cargo/index/"
          EOF
          
          cat > ~/.cargo/credentials.toml << EOF
          [registries.whs31]
          token = "Bearer ${{ secrets.CARGO_REGISTRY_TOKEN }}"
          EOF

      - name: Upload to Nextcloud
        if: env.PUBLISH_RELEASE_ARTIFACTS == 'true'
        env:
          NEXTCLOUD_USERNAME: ${{ secrets.NEXTCLOUD_USERNAME }}
          NEXTCLOUD_PASSWORD: ${{ secrets.NEXTCLOUD_PASSWORD }}
        run: |
          conan profile detect --force
          sed -i '/compiler=/c\compiler=gcc' ~/.conan2/profiles/default
          sed -i '/compiler.version=/c\compiler.version=14' ~/.conan2/profiles/default
          sed -i '/compiler.libcxx=/c\compiler.libcxx=libstdc++11' ~/.conan2/profiles/default
          sed -i '/compiler.cppstd=/c\compiler.cppstd=20' ~/.conan2/profiles/default
          printf '\n[conf]\ntools.cmake.cmaketoolchain:generator=Ninja\n' >> ~/.conan2/profiles/default
          conan remote add whs31 https://af.whs31.com/artifactory/api/conan/quasar-conan || true
          conan remote login whs31 "${{ secrets.CONAN_USERNAME }}" -p "${{ secrets.CONAN_PASSWORD }}"

      - name: Create Conan package
        run: conan create . -b missing --user quasar --channel dev

      - name: Upload to Conan registry
        run: conan upload "quasar.protobufs/*" -r whs31 --force -c

      - name: Cache Conan packages
        run: conan upload "*" -r whs31 -c || true
