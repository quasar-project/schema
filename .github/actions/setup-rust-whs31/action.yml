name: Setup Rust and whs31 Cargo registry
description: Install Rust, protoc, and configure the private Cargo registry.

runs:
  using: composite
  steps:
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install Protoc
      uses: arduino/setup-protoc@v3

    - name: Configure Cargo registry
      shell: bash
      run: |
        mkdir -p ~/.cargo

        cat > ~/.cargo/config.toml <<'EOF'
        [registry]
        global-credential-providers = ["cargo:token"]

        [registries.whs31]
        index = "sparse+https://af.whs31.com/artifactory/api/cargo/quasar-cargo/index/"
        EOF

        if [[ -n "${CARGO_REGISTRY_TOKEN:-}" ]]; then
          cat > ~/.cargo/credentials.toml <<EOF
        [registries.whs31]
        token = "Bearer ${CARGO_REGISTRY_TOKEN}"
        EOF
        fi