syntax = "proto3";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/duration.proto";
import public "quasar/latlon.proto";
import public "quasar/dim3.proto";
import public "quasar/euler_angles.proto";

package quasar.pb.relay.datagrams.nav;

enum NavigationSource {
  NAVIGATION_SOURCE_UNKNOWN = 0;
  NAVIGATION_SOURCE_NMEA_FILE = 1;
  NAVIGATION_SOURCE_NMEA_SERIAL_PORT = 2;
  NAVIGATION_SOURCE_NMEA_UDP = 3;
  NAVIGATION_SOURCE_NMEA_TCP = 4;
  NAVIGATION_SOURCE_VT45 = 5;
  NAVIGATION_SOURCE_MAVLINK = 6;
  NAVIGATION_SOURCE_FAKE = 255;
}

enum FixType {
  FIX_TYPE_INVALID = 0;
  FIX_TYPE_GPS = 1;
  FIX_TYPE_DGPS = 2;
  FIX_TYPE_PPS = 3;
  FIX_TYPE_RTK = 4;
  FIX_TYPE_FLOAT_RTK = 5;
  FIX_TYPE_DEAD_RECKONING = 6;
  FIX_TYPE_MANUAL_INPUT = 7;
  FIX_TYPE_SIMULATION = 8;
}

message Telemetry {
  LatLon coordinate = 1;
  float altitude = 2;
  float altitude_barometric = 15;
  float velocity_course = 3;
  float velocity_vertical = 4;
  Dim3 gyroscope = 5;
  Dim3 accelerometer = 6;
  Dim3 compass = 11;
  float gps_course = 16;
  EulerAngles euler_axes = 7;
  google.protobuf.Timestamp timestamp = 8;
  float pressure = 9;
  float temperature = 10;
  int32 satellites = 12;
  NavigationSource navigation_source = 13;
  FixType fix_type = 14;
}

message TelemetryRecord {
  repeated Telemetry telemetry = 1;
  google.protobuf.Duration duration = 2;
  bytes raw_data = 3;
}